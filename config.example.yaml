context:
  max_tokens: 4096
  window_max_tokens: 100000
  window_min_tokens: 50000
  summaries_max_count: 180
  summaries_min_count: 90
  debounce_timeout: 1.5
model:
  api_key: ''
  base_url: https://api.deepseek.com/v1
  model: deepseek-chat
  provider: deepseek
  temperature: 0.5
  reasoning_effort: max
prompts:
  persona: ''
vision:
  enabled: false
  provider: openai-compatible
  model: ''
  api_key: ''
  base_url: ''
  timeout_seconds: 60
  access_key_id: ''
  secret_access_key: ''
  session_token: ''
  region: cn-north-1
  service: cv
  action: OCRNormal
  version: '2020-08-26'
heartbeat:
  enabled: true
  interval_seconds: 2700
  aggressive_provider_cache_retention: false
logging:
  stream_store:
    enabled: true
    path: data/logs/mutsumi.ndjson
    max_bytes: 52428800
    backup_count: 5
    keep_ansi: true
  text_file:
    enabled: true
    path: data/logs/mutsumi.log
    max_bytes: 52428800
    backup_count: 5
    keep_ansi: false
napcat:
  access_token: ''
  http_url: http://localhost:3000
  ws_url: ws://localhost:3000
session:
  timeout: 300
memory:
  archive_threshold_tokens: 100
  self_note_target_tokens: 1000
  self_note_max_multiplier: 2.0
summarizer:
  provider: deepseek
  model: deepseek-chat
  api_key: ''
  base_url: https://api.deepseek.com/v1
  temperature: 0.3
render:
  markdown_image:
    enabled: false
    node_path: node
    script_path: tools/markdown-renderer/render.mjs
    output_dir: data/generated/markdown
    timeout_seconds: 20
    viewport_width: 960
    max_height: 12000
