napcat:
  ws_url: "ws://localhost:3000"
  http_url: "http://localhost:3000"

model:
  provider: "openai"       # openai / custom (OpenAI-compatible API)
  model: "gpt-4"
  temperature: 0.7
  # api_key: "your-api-key"  # 可选: 从环境变量 OPENAI_API_KEY 读取
  # base_url: "https://api.openai.com/v1"  # 自定义 API 端点 (如使用代理或本地模型)

context:
  window_size: 20
  max_tokens: 4096

memory:
  pg_connection: "postgresql://user:pass@localhost:5432/mutsumi"
  vector_dim: 1536

deduplication:
  wait_time: 1.0

cache:
  image_md5: "./cache/image_md5.json"
  meme_desc: "./cache/meme_desc.json"
